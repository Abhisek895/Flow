<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter with Login & Graph History</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
      padding: 20px;
      color: #0f172a;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      padding: 24px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .input-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .primary { background: #2563eb; color: white; }
    .secondary { background: #e2e8f0; color: #0f172a; }
    .danger { background: #ef4444; color: white; }
    .success { background: #16a34a; color: white; }
    .hidden { display: none; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .welcome {
      font-size: 16px;
      font-weight: 700;
    }

    .count-box {
      text-align: center;
      padding: 24px 12px;
      border-radius: 22px;
      background: #f8fafc;
      margin-bottom: 20px;
    }

    .count-number {
      font-size: 72px;
      font-weight: 800;
      margin-top: 6px;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 14px;
    }

    .nav-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .chart-card {
      padding: 10px 10px 0;
    }

    .chart-wrap {
      width: 100%;
      overflow-x: auto;
    }

    canvas {
      width: 100%;
      max-width: 100%;
      background: #f8fafc;
      border-radius: 18px;
      display: block;
    }

    .chart-note {
      margin-top: 14px;
      color: #64748b;
      font-size: 14px;
      text-align: center;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: #f8fafc;
      border-radius: 18px;
      padding: 18px;
      text-align: center;
    }

    .stat-box strong {
      display: block;
      font-size: 24px;
      margin-top: 6px;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .ok { color: #15803d; }
    .error { color: #b91c1c; }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 1000;
    }

    .popup {
      width: 100%;
      max-width: 360px;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
      text-align: center;
      animation: popupShow 0.2s ease;
    }

    .popup h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .popup p {
      color: #475569;
      margin-bottom: 20px;
      font-size: 15px;
      line-height: 1.5;
    }

    .popup-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    @keyframes popupShow {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 700px) {
      .grid,
      .stat-grid {
        grid-template-columns: 1fr;
      }

      .count-number {
        font-size: 56px;
      }

      .popup-buttons,
      .btn-row,
      .nav-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="authSection" class="card">
      <h1>Counter Website</h1>
      <p class="subtitle">Simple browser-based login with counter and graph history</p>

      <div class="grid">
        <div>
          <h2 class="section-title">Create Account</h2>
          <div class="input-group">
            <label for="registerUsername">Username</label>
            <input id="registerUsername" type="text" placeholder="Enter username" />
          </div>
          <div class="input-group">
            <label for="registerPassword">Password</label>
            <input id="registerPassword" type="password" placeholder="Enter password" />
          </div>
          <div class="btn-row">
            <button class="primary" onclick="registerUser()">Create Account</button>
          </div>
        </div>

        <div>
          <h2 class="section-title">Login</h2>
          <div class="input-group">
            <label for="loginUsername">Username</label>
            <input id="loginUsername" type="text" placeholder="Enter username" />
          </div>
          <div class="input-group">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="Enter password" />
          </div>
          <div class="btn-row">
            <button class="success" onclick="loginUser()">Login</button>
          </div>
        </div>
      </div>

      <div id="authMessage" class="message"></div>
    </div>

    <div id="appSection" class="hidden">
      <div class="card">
        <div class="topbar">
          <div class="welcome">Welcome, <span id="currentUserName"></span></div>
          <button class="secondary" onclick="openPopup('logout')">Logout</button>
        </div>

        <div class="nav-row">
          <button class="primary" onclick="showPage('counter')">Counter Page</button>
          <button class="secondary" onclick="showPage('history')">History Page</button>
        </div>

        <div id="counterPage">
          <div class="count-box">
            <div style="color:#64748b;">Current Count</div>
            <div class="count-number" id="count">0</div>
          </div>

          <div class="btn-row">
            <button class="primary" onclick="increaseCount()">Up</button>
            <button class="secondary" onclick="openPopup('reset')">Reset</button>
            <button class="danger" onclick="openPopup('clearHistory')">Clear History</button>
          </div>
        </div>

        <div id="historyPage" class="hidden">
          <div class="stat-grid">
            <div class="stat-box">
              Total Clicks
              <strong id="totalClicks">0</strong>
            </div>
            <div class="stat-box">
              Current Count
              <strong id="currentCountStat">0</strong>
            </div>
            <div class="stat-box">
              Active Days
              <strong id="activeDays">0</strong>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-wrap">
              <canvas id="historyChart" width="820" height="360"></canvas>
            </div>
            <p class="chart-note">Bar graph of total count increases by date</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <h2 id="popupTitle">Confirm</h2>
      <p id="popupText">Are you sure?</p>
      <div class="popup-buttons">
        <button class="success" onclick="confirmPopupAction()">Yes</button>
        <button class="danger" onclick="closePopup()">No</button>
      </div>
    </div>
  </div>

  <script>
    const authSection = document.getElementById('authSection');
    const appSection = document.getElementById('appSection');
    const authMessage = document.getElementById('authMessage');
    const currentUserName = document.getElementById('currentUserName');
    const countDisplay = document.getElementById('count');
    const popupOverlay = document.getElementById('popupOverlay');
    const popupTitle = document.getElementById('popupTitle');
    const popupText = document.getElementById('popupText');
    const counterPage = document.getElementById('counterPage');
    const historyPage = document.getElementById('historyPage');
    const chartCanvas = document.getElementById('historyChart');
    const chartCtx = chartCanvas.getContext('2d');

    let currentUser = null;
    let pendingAction = null;

    function getUsers() {
      return JSON.parse(localStorage.getItem('counter_users') || '{}');
    }

    function saveUsers(users) {
      localStorage.setItem('counter_users', JSON.stringify(users));
    }

    function showMessage(text, type) {
      authMessage.textContent = text;
      authMessage.className = type ? 'message ' + type : 'message';
    }

    function getNow() {
      return new Date().toLocaleString();
    }

    function getTodayKey() {
      const date = new Date();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function registerUser() {
      const username = document.getElementById('registerUsername').value.trim();
      const password = document.getElementById('registerPassword').value;
      const users = getUsers();

      if (!username || !password) {
        showMessage('Please enter username and password.', 'error');
        return;
      }

      if (users[username]) {
        showMessage('Username already exists.', 'error');
        return;
      }

      users[username] = {
        password,
        count: 0,
        clickHistory: {}
      };

      saveUsers(users);
      showMessage('Account created successfully. Now login.', 'ok');
      document.getElementById('registerUsername').value = '';
      document.getElementById('registerPassword').value = '';
    }

    function loginUser() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const users = getUsers();

      if (!username || !password) {
        showMessage('Please enter login username and password.', 'error');
        return;
      }

      if (!users[username] || users[username].password !== password) {
        showMessage('Invalid username or password.', 'error');
        return;
      }

      currentUser = username;
      localStorage.setItem('counter_current_user', username);
      showApp();
    }

    function logoutUser() {
      currentUser = null;
      localStorage.removeItem('counter_current_user');
      authSection.classList.remove('hidden');
      appSection.classList.add('hidden');
      showMessage('', '');
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginUsername').value = '';
    }

    function getCurrentUserData() {
      const users = getUsers();
      return users[currentUser];
    }

    function saveCurrentUserData(data) {
      const users = getUsers();
      users[currentUser] = data;
      saveUsers(users);
    }

    function updateDisplay() {
      const data = getCurrentUserData();
      countDisplay.textContent = data.count;
      document.getElementById('currentCountStat').textContent = data.count;
      renderChart();
    }

    function increaseCount() {
      const data = getCurrentUserData();
      const today = getTodayKey();
      data.count += 1;
      data.clickHistory[today] = (data.clickHistory[today] || 0) + 1;
      saveCurrentUserData(data);
      updateDisplay();
    }

    function resetCount() {
      const data = getCurrentUserData();
      data.count = 0;
      saveCurrentUserData(data);
      updateDisplay();
    }

    function clearHistory() {
      const data = getCurrentUserData();
      data.clickHistory = {};
      saveCurrentUserData(data);
      updateDisplay();
    }

    function openPopup(action) {
      pendingAction = action;

      if (action === 'reset') {
        popupTitle.textContent = 'Confirm Reset';
        popupText.textContent = 'Are you sure you want to reset the count?';
      } else if (action === 'logout') {
        popupTitle.textContent = 'Confirm Logout';
        popupText.textContent = 'Are you sure you want to logout?';
      } else if (action === 'clearHistory') {
        popupTitle.textContent = 'Clear History';
        popupText.textContent = 'Are you sure you want to clear the graph history?';
      }

      popupOverlay.style.display = 'flex';
    }

    function closePopup() {
      popupOverlay.style.display = 'none';
      pendingAction = null;
    }

    function confirmPopupAction() {
      if (pendingAction === 'reset') {
        resetCount();
      } else if (pendingAction === 'logout') {
        logoutUser();
      } else if (pendingAction === 'clearHistory') {
        clearHistory();
      }
      closePopup();
    }

    function showPage(page) {
      if (page === 'counter') {
        counterPage.classList.remove('hidden');
        historyPage.classList.add('hidden');
      } else {
        counterPage.classList.add('hidden');
        historyPage.classList.remove('hidden');
        renderChart();
      }
    }

    function renderChart() {
      const data = getCurrentUserData();
      const clickHistory = data.clickHistory || {};
      const labels = Object.keys(clickHistory).sort();
      const values = labels.map(key => clickHistory[key]);

      document.getElementById('totalClicks').textContent = values.reduce((a, b) => a + b, 0);
      document.getElementById('activeDays').textContent = labels.length;

      chartCtx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
      chartCtx.fillStyle = '#f8fafc';
      chartCtx.fillRect(0, 0, chartCanvas.width, chartCanvas.height);

      if (!labels.length) {
        chartCtx.fillStyle = '#64748b';
        chartCtx.font = '20px Arial';
        chartCtx.textAlign = 'center';
        chartCtx.fillText('No history yet', chartCanvas.width / 2, chartCanvas.height / 2);
        return;
      }

      const paddingLeft = 60;
      const paddingRight = 30;
      const paddingTop = 30;
      const paddingBottom = 70;
      const chartWidth = chartCanvas.width - paddingLeft - paddingRight;
      const chartHeight = chartCanvas.height - paddingTop - paddingBottom;
      const maxValue = Math.max(...values, 1);
      const barCount = values.length;
      const gap = 18;
      const barWidth = Math.max(28, (chartWidth - gap * (barCount - 1)) / barCount);
      const totalBarArea = barWidth * barCount + gap * (barCount - 1);
      const startX = paddingLeft + Math.max(0, (chartWidth - totalBarArea) / 2);

      chartCtx.strokeStyle = '#94a3b8';
      chartCtx.lineWidth = 1;
      chartCtx.beginPath();
      chartCtx.moveTo(paddingLeft, paddingTop);
      chartCtx.lineTo(paddingLeft, paddingTop + chartHeight);
      chartCtx.lineTo(chartCanvas.width - paddingRight, paddingTop + chartHeight);
      chartCtx.stroke();

      chartCtx.fillStyle = '#64748b';
      chartCtx.font = '12px Arial';
      chartCtx.textAlign = 'right';
      for (let i = 0; i <= 4; i++) {
        const value = Math.round((maxValue / 4) * i);
        const y = paddingTop + chartHeight - (chartHeight / 4) * i;
        chartCtx.fillText(value, paddingLeft - 10, y + 4);
        chartCtx.strokeStyle = '#e2e8f0';
        chartCtx.beginPath();
        chartCtx.moveTo(paddingLeft, y);
        chartCtx.lineTo(chartCanvas.width - paddingRight, y);
        chartCtx.stroke();
      }

      values.forEach((value, index) => {
        const x = startX + index * (barWidth + gap);
        const barHeight = (value / maxValue) * chartHeight;
        const y = paddingTop + chartHeight - barHeight;

        chartCtx.fillStyle = '#2563eb';
        chartCtx.fillRect(x, y, barWidth, barHeight);

        chartCtx.fillStyle = '#0f172a';
        chartCtx.font = '12px Arial';
        chartCtx.textAlign = 'center';
        chartCtx.fillText(value, x + barWidth / 2, y - 8);

        const shortLabel = labels[index].slice(5);
        chartCtx.fillStyle = '#475569';
        chartCtx.fillText(shortLabel, x + barWidth / 2, paddingTop + chartHeight + 18);
      });
    }

    function showApp() {
      authSection.classList.add('hidden');
      appSection.classList.remove('hidden');
      currentUserName.textContent = currentUser;
      showPage('counter');
      updateDisplay();
    }

    function autoLogin() {
      const savedUser = localStorage.getItem('counter_current_user');
      const users = getUsers();

      if (savedUser && users[savedUser]) {
        currentUser = savedUser;
        showApp();
      }
    }

    popupOverlay.addEventListener('click', function (event) {
      if (event.target === popupOverlay) {
        closePopup();
      }
    });

    autoLogin();
  </script>
</body>
</html>
