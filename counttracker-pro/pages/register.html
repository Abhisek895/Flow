<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CountTracker Pro</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/utils.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Redirect if already logged in
            const user = await getActiveUser();
            if (user) {
                window.location.href = 'dashboard.html';
                return;
            }

            const form = document.getElementById('register-form');
            const errorElement = document.getElementById('error-msg');
            const btn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorElement.textContent = '';
                
                const username = form.username.value.trim();
                const password = form.password.value;
                const confirmPassword = form.confirmPassword.value;

                if (!username || !password || !confirmPassword) {
                    errorElement.textContent = 'Please fill in all fields.';
                    return;
                }

                if (password.length < 6) {
                    errorElement.textContent = 'Password must be at least 6 characters long.';
                    return;
                }

                if (password !== confirmPassword) {
                    errorElement.textContent = 'Passwords do not match.';
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Creating...';

                try {
                    await register(username, password);
                    showToast('Registration successful! Please login.');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1000);
                } catch (err) {
                    errorElement.textContent = err.message || 'Registration failed.';
                    btn.disabled = false;
                    btn.innerHTML = 'Create Account';
                }
            });
        });
    </script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="ph ph-user-plus"></i>
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start tracking your counts today</p>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" autocomplete="new-password">
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" autocomplete="new-password">
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
