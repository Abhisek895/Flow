<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CountTracker Pro</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/utils.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('reset-form');
            const forgotSection = document.getElementById('forgot-section');
            const otpSection = document.getElementById('otp-section');
            const errorElement = document.getElementById('error-msg');
            const sendBtn = document.getElementById('send-btn');
            const resetBtn = document.getElementById('reset-btn');
            const emailInput = document.getElementById('email');
            const otpInput = document.getElementById('otp');
            const passwordInput = document.getElementById('new-password');

            sendBtn.addEventListener('click', async () => {
                const email = emailInput.value.trim();
                if (!email) {
                    errorElement.textContent = 'Please enter your email.';
                    return;
                }

                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Sending...';

                try {
                    const user = await db.users.getByEmail(email);
                    if (!user) throw new Error('No account found with this email.');

                    await sendOTP(email, 'reset');
                    
                    forgotSection.style.display = 'none';
                    otpSection.style.display = 'block';
                    showToast('OTP sent to your email!');
                } catch (err) {
                    if (err.message === 'Failed to fetch') {
                        errorElement.textContent = 'Backend server is not running. Please start the server at counttracker-pro/server';
                    } else {
                        errorElement.textContent = err.message || 'Failed to send OTP.';
                    }
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = 'Send Reset Code';
                }
            });

            resetBtn.addEventListener('click', async () => {
                const email = emailInput.value.trim();
                const otp = otpInput.value.trim();
                const password = passwordInput.value;

                if (!otp || !password) {
                    errorElement.textContent = 'Please fill in all fields.';
                    return;
                }

                if (password.length < 6) {
                    errorElement.textContent = 'Password must be at least 6 characters.';
                    return;
                }

                resetBtn.disabled = true;
                resetBtn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Resetting...';

                try {
                    await verifyOTP(email, otp);
                    await resetPassword(email, password);
                    
                    showToast('Password reset successful!');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } catch (err) {
                    if (err.message === 'Failed to fetch') {
                        errorElement.textContent = 'Backend server is not running. Please start the server at counttracker-pro/server';
                    } else {
                        errorElement.textContent = err.message || 'Verification failed.';
                    }
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = 'Reset Password';
                }
            });
        });
    </script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="ph ph-lock-key-open"></i>
                </div>
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your email to receive a reset code</p>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <div id="forgot-section" class="auth-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your registered email">
                </div>
                <button type="button" id="send-btn" class="btn btn-primary w-full">Send Reset Code</button>
            </div>

            <div id="otp-section" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label for="otp">Enter OTP</label>
                    <input type="text" id="otp" name="otp" placeholder="6-digit code" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
                </div>
                <div class="input-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new-password" placeholder="Min. 6 characters">
                </div>
                <button type="button" id="reset-btn" class="btn btn-primary w-full">Reset Password</button>
            </div>

            <div class="auth-footer">
                Remembered your password? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
