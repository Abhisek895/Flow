<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Reset Password</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }

        .step-num {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e5e7eb;
            color: #6b7280;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
        }

        .step.active .step-num {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }

        .step-label {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 600;
        }

        .step-divider {
            flex: 0.5;
            height: 2px;
            background: #e5e7eb;
            margin: 0 0.5rem;
        }

        .form-hint {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            background: #f3f4f6;
            border-radius: 6px;
            border-left: 3px solid #4f46e5;
        }

        .otp-input-wrapper {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .otp-digit {
            width: 45px;
            height: 50px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .otp-digit:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .resend-wrapper {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .resend-wrapper a {
            color: #4f46e5;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .resend-wrapper a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="../js/utils.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email') || '';

            const errorElement = document.getElementById('error-msg');
            const verifyBtn = document.getElementById('verify-btn');
            const otpInput = document.getElementById('otp');

            otpInput.addEventListener('input', (e) => {
                if (e.target.value.length === 6) {
                    verifyOTPCode();
                }
            });

            function verifyOTPCode() {
                const otp = otpInput.value.trim();

                if (!otp || otp.length !== 6) {
                    errorElement.textContent = 'Please enter a valid 6-digit OTP.';
                    return;
                }

                errorElement.textContent = '';
                verifyBtn.disabled = true;
                verifyBtn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Verifying...';

                verifyOTP(email, otp).then(() => {
                    showToast('OTP verified successfully!');
                    setTimeout(() => {
                        window.location.href = `new-password.html?email=${encodeURIComponent(email)}`;
                    }, 1500);
                }).catch((err) => {
                    errorElement.textContent = err.message || 'Invalid OTP. Please try again.';
                    verifyBtn.disabled = false;
                    verifyBtn.innerHTML = 'Verify OTP';
                    otpInput.value = '';
                    otpInput.focus();
                });
            }

            verifyBtn.addEventListener('click', verifyOTPCode);
        });
    </script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="ph ph-envelope-open"></i>
                </div>
                <h1 class="auth-title">Verify OTP</h1>
                <p class="auth-subtitle">Enter the code sent to your email</p>
            </div>

            <div class="step-indicator">
                <div class="step active">
                    <div class="step-num">1</div>
                    <div class="step-label">Verify OTP</div>
                </div>
                <div class="step-divider"></div>
                <div class="step">
                    <div class="step-num">2</div>
                    <div class="step-label">New Password</div>
                </div>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <div class="form-hint">
                <i class="ph ph-info"></i> Enter the 6-digit code we sent to your email
            </div>

            <div class="auth-form">
                <div class="input-group">
                    <label for="otp">OTP Code</label>
                    <input type="text" id="otp" name="otp" placeholder="000000" maxlength="6" 
                        style="text-align: center; font-size: 1.5rem; letter-spacing: 10px; font-weight: 700;">
                </div>
                <button type="button" id="verify-btn" class="btn btn-primary w-full">Verify OTP</button>
            </div>

            <div class="resend-wrapper">
                Didn't receive the code? <a href="forgot-password.html">Try again</a>
            </div>

            <div class="auth-footer">
                <a href="forgot-password.html">Back to Account Recovery</a>
            </div>
        </div>
    </div>
</body>

</html>
</body>

</html>
