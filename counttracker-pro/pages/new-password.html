<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }

        .step-num {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e5e7eb;
            color: #6b7280;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
        }

        .step.active .step-num {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }

        .step.completed .step-num {
            background: #10b981;
            color: white;
        }

        .step-label {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 600;
        }

        .step-divider {
            flex: 0.5;
            height: 2px;
            background: #e5e7eb;
            margin: 0 0.5rem;
        }

        .form-hint {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            background: #f3f4f6;
            border-radius: 6px;
            border-left: 3px solid #4f46e5;
        }

        .password-strength {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            transition: background 0.3s;
        }

        .strength-bar.weak {
            background: #ef4444;
        }

        .strength-bar.medium {
            background: #f59e0b;
        }

        .strength-bar.strong {
            background: #10b981;
        }

        .strength-text {
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
            color: #6b7280;
        }
    </style>
    <script src="../js/utils.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email') || '';

            const errorElement = document.getElementById('error-msg');
            const resetBtn = document.getElementById('reset-btn');
            const passwordInput = document.getElementById('new-password');

            function getPasswordStrength(password) {
                if (password.length < 6) return 'weak';
                if (password.length < 10 || !/[A-Z]/.test(password)) return 'medium';
                return 'strong';
            }

            function updateStrengthIndicator() {
                const strength = getPasswordStrength(passwordInput.value);
                const bars = document.querySelectorAll('.strength-bar');
                const text = document.querySelector('.strength-text');
                
                bars.forEach(bar => {
                    bar.classList.remove('weak', 'medium', 'strong');
                });

                if (strength === 'weak') {
                    bars[0].classList.add('weak');
                    text.textContent = 'Password too short (min. 6 characters)';
                    text.style.color = '#ef4444';
                } else if (strength === 'medium') {
                    bars[0].classList.add('medium');
                    bars[1].classList.add('medium');
                    text.textContent = 'Good. Add uppercase letters for stronger password';
                    text.style.color = '#f59e0b';
                } else {
                    bars[0].classList.add('strong');
                    bars[1].classList.add('strong');
                    bars[2].classList.add('strong');
                    text.textContent = 'Strong password';
                    text.style.color = '#10b981';
                }
            }

            passwordInput.addEventListener('input', updateStrengthIndicator);

            resetBtn.addEventListener('click', async () => {
                const password = passwordInput.value;

                errorElement.textContent = '';

                if (!password) {
                    errorElement.textContent = 'Please enter a new password.';
                    return;
                }

                if (password.length < 6) {
                    errorElement.textContent = 'Password must be at least 6 characters long.';
                    return;
                }

                resetBtn.disabled = true;
                resetBtn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Saving...';

                try {
                    await resetPassword(email, password);
                    showToast('Password reset successful! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } catch (err) {
                    errorElement.textContent = err.message || 'Failed to reset password.';
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = 'Set Password';
                }
            });

            // Trigger initial strength update
            updateStrengthIndicator();
        });
    </script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="ph ph-lock"></i>
                </div>
                <h1 class="auth-title">Set New Password</h1>
                <p class="auth-subtitle">Create a strong password for your account</p>
            </div>

            <div class="step-indicator">
                <div class="step completed">
                    <div class="step-num"><i class="ph ph-check" style="font-size: 1.2rem;"></i></div>
                    <div class="step-label">Verify OTP</div>
                </div>
                <div class="step-divider"></div>
                <div class="step active">
                    <div class="step-num">2</div>
                    <div class="step-label">New Password</div>
                </div>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <div class="form-hint">
                <i class="ph ph-info"></i> Choose a strong password with at least 6 characters
            </div>

            <div class="auth-form">
                <div class="input-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new-password" placeholder="Create a strong password">
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <div class="strength-text"></div>
                </div>
                <button type="button" id="reset-btn" class="btn btn-primary w-full">Set Password</button>
            </div>

            <div class="auth-footer">
                <a href="otp-password-reset.html">Back to OTP Verification</a>
            </div>
        </div>
    </div>
</body>

</html>
