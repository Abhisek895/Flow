<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - CountTracker Pro</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/analytics.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #temp-content { display: none; }
    </style>
</head>
<body>
    <div id="app-layout">
        <div class="loader-container">
            <div class="spinner"></div>
        </div>
    </div>

    <div id="temp-content">
        <div class="dashboard-section">
            <h2 style="margin-bottom: 1.5rem;"><i class="ph ph-chart-bar text-primary"></i> Analytics Overview</h2>
            
            <div class="analytics-cards">
                <div class="mini-stat-card streak-card">
                    <div class="mini-stat-title"><i class="ph ph-fire"></i> Current Streak</div>
                    <div class="mini-stat-value" id="stat-streak">0 Days</div>
                </div>
                <div class="mini-stat-card">
                    <div class="mini-stat-title">Weekly Average</div>
                    <div class="mini-stat-value" id="stat-weekly-avg">0/day</div>
                </div>
                <div class="mini-stat-card">
                    <div class="mini-stat-title">Monthly Total</div>
                    <div class="mini-stat-value" id="stat-monthly-total">0</div>
                </div>
            </div>

            <!-- Second Row of Stats -->
            <div class="analytics-cards" style="margin-bottom: 1.5rem;">
                <div class="mini-stat-card">
                    <div class="mini-stat-title">Avg Session Length</div>
                    <div class="mini-stat-value" id="stat-avg-duration">0m 0s</div>
                </div>
                <div class="mini-stat-card">
                    <div class="mini-stat-title">Best Day Ever</div>
                    <div class="mini-stat-value" id="stat-best-day">0</div>
                </div>
            </div>

            <div class="chart-wrapper">
                <h3 class="chart-title"><i class="ph ph-calendar-blank"></i> Activity Over the Last 30 Days</h3>
                <div style="position: relative; height: 250px; width: 100%; max-height: 40vh;">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;">
                <div class="chart-wrapper">
                    <h3 class="chart-title"><i class="ph ph-clock"></i> Sessions Breakdown</h3>
                    <div style="position: relative; height: 220px; width: 100%; display: flex; justify-content: center;">
                        <canvas id="durationChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-wrapper">
                    <h3 class="chart-title"><i class="ph ph-trophy"></i> Top Sessions</h3>
                    <div id="top-sessions-list" style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <!-- List -->
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/analytics.js"></script>
</body>
</html>
