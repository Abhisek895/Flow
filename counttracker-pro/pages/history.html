<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Flow</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/history.css">
    <style>
        #temp-content {
            display: none;
        }
    </style>
</head>

<body>
    <div id="app-layout">
        <div class="loader-container">
            <div class="spinner"></div>
        </div>
    </div>

    <div id="temp-content">
        <div class="dashboard-section">
            <div class="history-controls">
                <h2 style="margin:0;"><i class="ph ph-clock-counter-clockwise text-primary"></i> Session History</h2>

                <div class="filter-group">
                    <label for="date-filter" class="text-secondary" style="font-size: 0.875rem;">Timeframe:</label>
                    <select id="date-filter" class="filter-select">
                        <option value="all">All Time</option>
                        <option value="today">Today</option>
                        <option value="7days">Last 7 Days</option>
                        <option value="30days">Last 30 Days</option>
                    </select>
                </div>
            </div>

            <div class="sessions-list" id="sessions-list">
                <!-- Loader -->
                <div class="text-center" style="padding: 3rem;">
                    <i class="ph ph-spinner-gap ph-spin text-primary" style="font-size: 2rem;"></i>
                </div>
            </div>

            <div id="empty-state" style="display: none; text-align: center; padding: 4rem 1rem;">
                <i class="ph ph-folder-open text-secondary" style="font-size: 4rem; margin-bottom: 1rem;"></i>
                <h3>No sessions found</h3>
                <p class="text-secondary">Start counting to build your history.</p>
                <button class="btn btn-primary mt-4" onclick="window.location.href='counter.html'">Go to
                    Counter</button>
            </div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/history.js"></script>
</body>

</html>
